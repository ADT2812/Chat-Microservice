version: "3.9"

services:

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"

  chat-service:
    build: ./chat-service
    ports:
      - "8002:8002"

  presence-service:
    build: ./presence-service
    ports:
      - "8003:8003"

  notification-service:
    build: ./notification-service
    ports:
      - "8004:8004"

  media-service:
    build: ./media-service
    ports:
      - "8005:8005"

  mongo:
    image: mongo:6
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db     

volumes:
  mongo-data:   