<!DOCTYPE html>
<html>

<head>
<title>Login Chat System</title>

<style>

body{
font-family:Arial;
background:#ece5dd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:20px;
border-radius:10px;
width:400px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:8px;
margin-bottom:8px;
}

button{
width:100%;
padding:10px;
background:#25D366;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

.chat{
display:none;
}

.messages{
height:250px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.msg{
background:#dcf8c6;
padding:6px;
margin:5px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="box">

<!-- 🔐 LOGIN SECTION -->
<div id="loginSection">

<h3>Login</h3>

<input id="username" placeholder="Username"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="login()">Login</button>

<p>OR</p>

<button onclick="register()">Register</button>

</div>

<!-- 💬 CHAT SECTION -->
<div id="chatSection" class="chat">

<h3>Private Chat</h3>

<input id="receiver" placeholder="Receiver"/>
<div class="messages" id="messages"></div>
<input id="message" placeholder="Message"/>
<button onclick="send()">Send</button>

</div>

</div>

<script>

let ws;
let token;

function register(){

fetch("http://localhost:8001/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:document.getElementById("username").value,
password:document.getElementById("password").value
})
})
.then(res=>{

if(!res.ok){
throw new Error("Register Failed")
}

return res.text()

})
.then(()=>{
alert("User Registered Successfully")
})
.catch(err=>{
alert("Register Failed")
console.log(err)
})

}

function login(){

fetch("http://localhost:8001/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:document.getElementById("username").value,
password:document.getElementById("password").value
})
})
.then(res => {

if(!res.ok){
throw new Error("Login Failed")
}

return res.json()

})
.then(data => {

token = data.token

alert("Login Successful")

document.getElementById("loginSection").style.display="none"
document.getElementById("chatSection").style.display="block"

connectWebSocket()

})
.catch(err=>{
alert("Login Error")
console.log(err)
})

}

function connectWebSocket(){

ws = new WebSocket("ws://localhost:8002/ws")

ws.onopen = ()=>{

console.log("WebSocket Connected")

// 🔥 Send token FIRST
ws.send(token)

}

// ✅ When message comes from other tab
ws.onmessage = (event)=>{

let data = JSON.parse(event.data)

let div = document.createElement("div")
div.className="msg"

div.innerHTML="<b>"+data.sender+"</b>: "+data.message

document.getElementById("messages").appendChild(div)

}

ws.onclose = ()=>{
console.log("WebSocket Closed")
}

}

function send(){

if(!ws || ws.readyState !== WebSocket.OPEN){
alert("WebSocket not connected")
return
}

let receiver = document.getElementById("receiver").value
let message = document.getElementById("message").value

if(message === "") return

let payload = {
sender: parseJwt(token).username,
receiver: receiver,
message: message
}

// 🔥 Show message locally immediately
let div = document.createElement("div")
div.className="msg"
div.style.textAlign="right"
div.innerHTML="<b>You</b>: "+message

document.getElementById("messages").appendChild(div)

// 🔥 Send to backend
ws.send(JSON.stringify(payload))

document.getElementById("message").value=""

}

function parseJwt(token){

let base64 = token.split('.')[1]
let decoded = atob(base64)
return JSON.parse(decoded)

}

</script>

</body>
</html>
